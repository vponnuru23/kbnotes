<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KBNotes</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      background: #f4f4f4;
    }
    .sidebar {
      width: 280px;
      min-width: 240px;
      background: #1f2937;
      color: #f8fafc;
      display: flex;
      flex-direction: column;
      padding: 24px;
      box-sizing: border-box;
    }
    .sidebar h1 {
      margin: 0 0 1rem;
      font-size: 1.3rem;
      line-height: 1.4;
    }
    .menu {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .menu a {
      color: #e2e8f0;
      text-decoration: none;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      display: block;
      transition: background 0.2s ease;
    }
    .menu a:hover,
    .menu a.active {
      background: #374151;
    }
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: white;
      border-left: 1px solid #d1d5db;
      overflow: hidden;
    }
    .content iframe {
      border: 0;
      width: 100%;
      height: 100%;
      flex: 1;
    }
    .content-header {
      padding: 20px 24px;
      border-bottom: 1px solid #e5e7eb;
      background: #fafafa;
    }
    .content-header h2 {
      margin: 0;
      font-size: 1.25rem;
      color: #111827;
    }
  </style>
</head>
<body>
  <aside class="sidebar">
    <h1>Ollama setup - Linux</h1>
    <ul class="menu">
      <li><a href="#" data-src="ollama/setup_linux.html" class="active">Ollama setup</a></li>
    </ul>
  </aside>

  <section class="content">
    <iframe id="preview" src="ollama/setup_linux.html" title="Ollama setup preview"></iframe>
  </section>

  <script>
    const links = document.querySelectorAll('.menu a');
    const iframe = document.getElementById('preview');

    links.forEach(link => {
      link.addEventListener('click', event => {
        event.preventDefault();
        links.forEach(l => l.classList.remove('active'));
        link.classList.add('active');
        iframe.src = link.dataset.src;
      });
    });
  </script>
</body>
</html>
